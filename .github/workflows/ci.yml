name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      # viewer links solve (add_subdirectory(../solve)), which in turn links
      # mount_drift (../mount_drift). Both siblings must sit beside this repo.
      - uses: actions/checkout@v4
        with:
          path: viewer
      - uses: actions/checkout@v4
        with:
          repository: sinew-mocap/solve
          path: solve
          token: ${{ secrets.SINEW_CI_TOKEN || github.token }}
      - uses: actions/checkout@v4
        with:
          repository: sinew-mocap/mount_drift
          path: mount_drift
          token: ${{ secrets.SINEW_CI_TOKEN || github.token }}

      - name: Configure
        run: cmake -S viewer -B build -DSINEW_TESTS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure --no-tests=ignore
